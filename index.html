<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>تسجيل الدخول</title>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-lg shadow-lg w-96">
        <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">تسجيل الدخول</h2>
        <form id="loginForm">
            <div class="mb-4">
                <label class="block text-gray-700">اسم المستخدم</label>
                <input type="text" id="username" class="w-full p-2 border rounded mt-1" required>
            </div>
            <div class="mb-6">
                <label class="block text-gray-700">كلمة المرور</label>
                <input type="password" id="password" class="w-full p-2 border rounded mt-1" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">دخول</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // غير الرابط ده من الـ IP المباشر إلى مسار الكوبري
	        const response = await fetch('/api/proxy/auth/login', {
    		method: 'POST',
    		headers: { 'Content-Type': 'application/json' },
    		body: JSON.stringify({ username, password })
		});

            if (response.ok) {
                const data = await response.json();
                localStorage.setItem('token', data.token); // حفظ التوكين
                window.location.href = 'dashboard.html';
            } else {
                alert('خطأ: تأكد من اسم المستخدم وكلمة المرور');
            }
        });
    </script>
</body>
</html>
